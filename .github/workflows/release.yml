name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release (no assets yet)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            tool: cargo
          - os: macos-latest
            target: aarch64-apple-darwin
            tool: cargo
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tool: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            tool: cross
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # travsr-core is patched from a sibling repo (../travsr). Mirror the same
      # checkout+symlink pattern used in ci.yml so Cargo resolves [patch.crates-io].
      - uses: actions/checkout@v4
        with:
          repository: Travsr-com/travsr
          ref: feature/travsr-indexer-store-317-phase-b-unification
          path: _travsr

      - name: Symlink _travsr as ../travsr for Cargo patch resolution
        run: ln -s "$GITHUB_WORKSPACE/_travsr" "$GITHUB_WORKSPACE/../travsr"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64-linux only)
        if: matrix.tool == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # cross 0.2.5 builds inside Docker and mounts the project at the same absolute
      # path as on the host (not /project). The host symlink ../travsr is outside
      # the workspace mount so it is invisible inside the container. file::canonicalize
      # also resolves through the symlink, so cross's own workspace-dep mount lands
      # at the canonical _travsr path, not the ../travsr path Cargo looks for.
      # CROSS_CONTAINER_OPTS (not CROSS_DOCKER_OPTS) is the correct env var in 0.2.5.
      # We mount _travsr at $(dirname GITHUB_WORKSPACE)/travsr, i.e. the exact path
      # ../travsr resolves to from inside the container.
      - name: Expose travsr sibling to cross Docker container
        if: matrix.tool == 'cross'
        run: echo "CROSS_CONTAINER_OPTS=-v $GITHUB_WORKSPACE/_travsr:$(dirname $GITHUB_WORKSPACE)/travsr" >> $GITHUB_ENV

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build all language binaries
        shell: bash
        run: |
          BINS=(
            travsr-lang-c
            travsr-lang-cpp
            travsr-lang-csharp
            travsr-lang-dart
            travsr-lang-go
            travsr-lang-java
            travsr-lang-kotlin
            travsr-lang-php
            travsr-lang-python
            travsr-lang-ruby
            travsr-lang-scala
            travsr-lang-swift
          )
          for bin in "${BINS[@]}"; do
            ${{ matrix.tool }} build --release --bin "$bin" --target ${{ matrix.target }}
          done

      - name: Package binaries and compute SHA256
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          BINS=(
            travsr-lang-c
            travsr-lang-cpp
            travsr-lang-csharp
            travsr-lang-dart
            travsr-lang-go
            travsr-lang-java
            travsr-lang-kotlin
            travsr-lang-php
            travsr-lang-python
            travsr-lang-ruby
            travsr-lang-scala
            travsr-lang-swift
          )
          mkdir -p dist
          for bin in "${BINS[@]}"; do
            src="target/${TARGET}/release/${bin}"
            # strip reduces binary size; skip silently on cross-compiled targets
            # where the host strip does not understand the target arch
            strip "$src" 2>/dev/null || true
            dst="dist/${bin}-${TARGET}"
            cp "$src" "$dst"
            # SHA256: sha256sum on Linux, shasum on macOS
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$dst" | awk '{print $1}' > "${dst}.sha256"
            else
              shasum -a 256 "$dst" | awk '{print $1}' > "${dst}.sha256"
            fi
          done

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-swift-emitter:
    name: build swift-index-emitter (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift (Linux only)
        if: runner.os == 'Linux'
        run: |
          wget -q https://download.swift.org/swift-6.0.3-release/ubuntu2204/swift-6.0.3-RELEASE/swift-6.0.3-RELEASE-ubuntu22.04.tar.gz
          tar -xzf swift-6.0.3-RELEASE-ubuntu22.04.tar.gz
          echo "$GITHUB_WORKSPACE/swift-6.0.3-RELEASE-ubuntu22.04/usr/bin" >> $GITHUB_PATH
      - name: Build swift-index-emitter
        run: |
          cd packages/swift-index-emitter
          swift build -c release
      - name: Package and checksum
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          SRC="packages/swift-index-emitter/.build/release/swift-index-emitter"
          mkdir -p dist
          DST="dist/travsr-swift-index-emitter-${TARGET}"
          cp "$SRC" "$DST"
          chmod +x "$DST"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$DST" | awk '{print $1}' > "${DST}.sha256"
          else
            shasum -a 256 "$DST" | awk '{print $1}' > "${DST}.sha256"
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-dart-emitter:
    name: build dart-scip-emitter (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: |
          cd packages/dart-scip-emitter
          dart pub get
      - name: Compile to native binary
        run: |
          cd packages/dart-scip-emitter
          dart compile exe bin/emit.dart -o bin/travsr-dart-index-emitter
      - name: Package and checksum
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          SRC="packages/dart-scip-emitter/bin/travsr-dart-index-emitter"
          mkdir -p dist
          DST="dist/travsr-dart-index-emitter-${TARGET}"
          cp "$SRC" "$DST"
          chmod +x "$DST"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$DST" | awk '{print $1}' > "${DST}.sha256"
          else
            shasum -a 256 "$DST" | awk '{print $1}' > "${DST}.sha256"
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: publish npm packages
    needs: [build, build-swift-emitter, build-dart-emitter]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish all language packages
        shell: bash
        run: |
          # Strip leading "v" from tag: "v0.1.0" -> "0.1.0"
          VERSION="${GITHUB_REF_NAME#v}"
          LANGS=(c cpp csharp dart go java kotlin php python ruby scala swift)
          for lang in "${LANGS[@]}"; do
            echo "Publishing @travsr-plugin/${lang} @ ${VERSION} …"
            # postinstall.js lives at npm/postinstall.js (shared source of truth).
            # Copy it into the package dir so it is included in the npm tarball.
            cp npm/postinstall.js "npm/${lang}/postinstall.js"
            (
              cd "npm/${lang}"
              npm version "$VERSION" --no-git-tag-version --allow-same-version
              npm publish --access public
            )
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
